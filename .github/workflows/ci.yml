name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  source-release-residue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify source-only release contract
        run: ./scripts/release-check.sh --tree

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Test (race)
        shell: bash
        run: |
          mapfile -t packages < <(
            go list ./... |
              grep -Ev '/(catalog|catalogworker|holder|sourceauthority|tenant)$'
          )
          (( ${#packages[@]} > 0 ))
          ./scripts/test.sh -p=1 -race -count=1 -timeout=300s "${packages[@]}"

      # Catalog, tenant, transport, and holder orchestration stay cgofuse-free.
      - name: Pure build gate (CGO_ENABLED=0)
        run: CGO_ENABLED=0 go build ./...

      - name: Cross-compile smoke (pure)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./...
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build ./...

  race-shards:
    name: race (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: catalog-1, package: ./catalog, shard: 0, shards: 8 }
          - { name: catalog-2, package: ./catalog, shard: 1, shards: 8 }
          - { name: catalog-3, package: ./catalog, shard: 2, shards: 8 }
          - { name: catalog-4, package: ./catalog, shard: 3, shards: 8 }
          - { name: catalog-5, package: ./catalog, shard: 4, shards: 8 }
          - { name: catalog-6, package: ./catalog, shard: 5, shards: 8 }
          - { name: catalog-7, package: ./catalog, shard: 6, shards: 8 }
          - { name: catalog-8, package: ./catalog, shard: 7, shards: 8 }
          - { name: catalogworker-1, package: ./catalogworker, shard: 0, shards: 4 }
          - { name: catalogworker-2, package: ./catalogworker, shard: 1, shards: 4 }
          - { name: catalogworker-3, package: ./catalogworker, shard: 2, shards: 4 }
          - { name: catalogworker-4, package: ./catalogworker, shard: 3, shards: 4 }
          - { name: holder, package: ./holder, shard: 0, shards: 1 }
          - { name: sourceauthority, package: ./sourceauthority, shard: 0, shards: 1 }
          - { name: tenant, package: ./tenant, shard: 0, shards: 1 }
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Select exact test shard
        id: shard
        env:
          PACKAGE: ${{ matrix.package }}
          SHARD: ${{ matrix.shard }}
          SHARDS: ${{ matrix.shards }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tests < <(
            ./scripts/test.sh -list '^Test' "$PACKAGE" |
              awk '/^Test[A-Za-z0-9_]+$/ { print }' |
              LC_ALL=C sort
          )
          (( ${#tests[@]} > 0 ))
          selected=()
          for index in "${!tests[@]}"; do
            if (( index % SHARDS == SHARD )); then
              selected+=("${tests[$index]}")
            fi
          done
          (( ${#selected[@]} > 0 ))
          regex="$(IFS='|'; printf '^(%s)$' "${selected[*]}")"
          {
            echo 'regex<<EOF'
            echo "$regex"
            echo EOF
          } >> "$GITHUB_OUTPUT"
          printf '%s\n' "${selected[@]}"

      - name: Test exact shard (race)
        env:
          PACKAGE: ${{ matrix.package }}
          TEST_REGEX: ${{ steps.shard.outputs.regex }}
        run: ./scripts/test.sh -race -count=1 -timeout=180s -run "$TEST_REGEX" "$PACKAGE"

  fuse-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      # cgofuse under plain `-tags fuse` takes its linux !fuse3 path
      # (-I/usr/include/fuse, FUSE_USE_VERSION=28), so it needs the libfuse2 dev
      # headers — libfuse3-dev installs under /usr/include/fuse3 and is not found.
      - name: Install libfuse
        run: sudo apt-get update && sudo apt-get install -y libfuse-dev

      - name: go vet (fuse)
        run: CGO_ENABLED=1 go vet -tags fuse ./...

      - name: Build smoke (fuse)
        run: CGO_ENABLED=1 go build -tags fuse ./...

      - name: Pure build stays green
        run: CGO_ENABLED=0 go build ./...

  fuse-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install fuse-t (build-time headers + dylib)
        run: brew install macos-fuse-t/cask/fuse-t

      - name: go vet (fuse)
        run: CGO_ENABLED=1 go vet -tags fuse ./...

      - name: Build smoke (fuse)
        run: CGO_ENABLED=1 go build -tags fuse ./...

      # Callback-level only. Signed-child, live-mount, and TCC gates run in an
      # isolated VM with the consumer app identity installed.
      - name: Test (fuse callbacks)
        shell: bash
        run: |
          packages=()
          while IFS= read -r package; do
            packages+=("$package")
          done < <(
            git grep -l '^//go:build .*fuse' -- '*_test.go' |
              while IFS= read -r file; do dirname "$file"; done |
              sort -u |
              sed 's#^#./#'
          )
          (( ${#packages[@]} > 0 ))
          CGO_ENABLED=1 ./scripts/test.sh -tags fuse -count=1 "${packages[@]}"

      - name: Pure build stays green
        run: CGO_ENABLED=0 go build ./...

  swift:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install lint tools missing from the image
        run: |
          command -v swiftformat >/dev/null || brew install swiftformat
          command -v swiftlint >/dev/null || brew install swiftlint

      - name: Generated schema drift
        run: |
          go run ./catalogproto/gen -check
          go run ./catalogworker/gen -check
          go run ./mountproto/gen -check
          go run ./sourcedriverproto/gen -check
          go run ./transportproto/gen -check

      - name: Format (lint mode)
        run: swiftformat --lint .

      - name: Lint
        run: swiftlint --quiet

      - name: Build
        run: swift build

      - name: Test
        run: swift test
