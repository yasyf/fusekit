name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify-tag-on-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: yasyf/homebrew-tap/.github/actions/verify-tag-on-main@v1

  release:
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Publish source release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes
